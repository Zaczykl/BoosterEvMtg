<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTG Booster EV Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#c9a84c">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Booster EV">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="page">
    <header>
        <div class="header-ornament">&#10022; &nbsp; Magic: The Gathering &nbsp; &#10022;</div>
        <h1>Booster EV Calculator</h1>
        <h2 id="subtitle">Obliczanie wartości oczekiwanej</h2>
    </header>

    <div class="search-bar">
        <select class="set-select" id="set-select"></select>
        <div class="price-input-wrap">
            <label for="pack-price">Cena boostera:</label>
            <input type="number" id="pack-price" value="15.00" step="0.50" min="0">
            <span>PLN</span>
        </div>
        <button class="fetch-btn" id="fetch-btn">Oblicz EV</button>
    </div>

    <div class="fx-bar">
        <span class="fx-label">EUR/PLN</span>
        <span class="fx-rate" id="fx-rate">ładowanie…</span>
        <span class="fx-source" id="fx-source"></span>
        <div class="fx-input-wrap">
            <label for="fx-manual">Kurs ręczny:</label>
            <input type="number" id="fx-manual" value="4.25" step="0.01" min="1">
            <span>PLN</span>
        </div>
    </div>

    <div class="progress-wrap" id="progress-wrap">
        <div class="progress-label" id="progress-label">Pobieranie...</div>
        <div class="progress-bar-outer"><div class="progress-bar-inner" id="progress-bar"></div></div>
    </div>
    <div class="error-msg" id="error-msg"></div>
    <div class="ev-card" id="ev-card"></div>

    <div class="cards-section" id="cards-section">
        <div class="section-header">
            <div class="section-title">Karty w Boosterze</div>
            <div class="filters" id="filters"></div>
        </div>
        <div class="table-wrap">
           <table class="card-table">
  <thead>
    <tr>
      <th data-sort="name">Nazwa</th>
      <th data-sort="rarity">Rarity</th>
      <th data-sort="pools">Pule</th>
      <th data-sort="probability" class="num">Szansa</th>
      <th data-sort="price" class="num sorted">Cena (EUR)</th>
      <th class="num">PLN</th>
    </tr>
  </thead>
  <tbody id="card-tbody"></tbody>
</table>
        </div>
    </div>
</div>

<script type="module" src="js/main.js"></script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/sw.js")
        .then(reg => console.log("SW registered:", reg.scope))
        .catch(err => console.warn("SW failed:", err));
    });
  }
</script>
</body>
</html>
